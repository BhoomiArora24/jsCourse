<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download Simulation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0b1120;
        overflow: hidden;
      }

      /* Background Glow */

      body::before,
      body::after {
        content: "";
        position: absolute;
        width: 350px;
        height: 350px;
        border-radius: 50%;
        filter: blur(120px);
        z-index: -1;
      }

      body::before {
        background: #2563eb;
        top: -100px;
        left: -120px;
      }

      body::after {
        background: #7c3aed;
        bottom: -100px;
        right: -120px;
      }

      .card {
        width: 380px;
        padding: 35px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      .file-icon {
        width: 90px;
        height: 90px;
        margin: auto;
        margin-bottom: 18px;
        border-radius: 18px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 45px;
        background: rgba(255, 255, 255, 0.08);
      }

      h2 {
        color: white;
        font-size: 27px;
        margin-bottom: 6px;
      }

      p {
        color: #94a3b8;
        margin-bottom: 30px;
      }

      .progress-container {
        width: 100%;
        height: 12px;
        background: #1e293b;
        border-radius: 50px;
        overflow: hidden;
      }

      .progress {
        
        height: 100%;
        border-radius: 50px;
        background: linear-gradient(90deg, #38bdf8, #3b82f6, #6366f1);
        
      }

      .details {
        margin-top: 15px;
        display: flex;
        justify-content: space-between;
        color: #cbd5e1;
        font-size: 15px;
      }

      button {
        width: 100%;
        margin-top: 35px;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(90deg, #2563eb, #3b82f6);
        color: white;
        font-size: 17px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4);
      }

      button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="file-icon">📦</div>

      <h2>React Course.zip</h2>
      <p>1.24 GB</p>

      <div class="progress-container">
        <div class="progress"></div>
      </div>

      <div class="details">
        <span id="percent">0%</span>
        <span id="status">Waiting...</span>
      </div>

      <button id="downloadBtn">Download</button>
    </div>
    
    <script src = "2script.js"></script>
  </body>
</html>
